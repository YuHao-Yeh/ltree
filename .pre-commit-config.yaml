default_language_version:
  python: python

exclude: '^(.venv|venv|node_modules|dist|build|out)/'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        description: Trims trailing whitespace from files.
      - id: end-of-file-fixer
        description: Ensures that a file is either empty, or ends with one newline.
      - id: check-yaml
        description: Attempts to load all yaml files to verify syntax.
      - id: check-toml
        description: Attempts to load all toml files to verify syntax.
      - id: check-json
        description: Attempts to load all json files to verify syntax (covers package.json and .ltreerc).
      - id: check-added-large-files
        description: Prevents giant files from being committed.
      - id: check-merge-conflict
        description: Checks for files that contain merge conflict strings.
      - id: check-case-conflict
        description: Helps locate files with names that would conflict on a case-insensitive filesystem.


  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.3
    hooks:
      - id: ruff
        args: [ --fix ]
        description: Run Ruff linter and auto-fix safe rules.
      - id: ruff-format
        description: Run Ruff formatter.

  - repo: local
    hooks:
      - id: pytest
        name: Run pytest
        entry: pytest
        language: system
        pass_filenames: false
        always_run: true
        stages: [ pre-commit ]
        description: Ensures all unit tests pass before staging.

      - id: vscode-compile
        name: Compile VS Code Extension (TypeScript)
        entry: npm --prefix ltree-vscode run compile
        language: system
        files: ^ltree-vscode/src/
        pass_filenames: false
        stages: [ pre-commit ]
        description: Compiles TypeScript files inside VS Code extension to guarantee syntax validity.
